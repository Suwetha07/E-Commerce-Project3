# =============================================================
# Grafana Ingress - grafana.example.com
# =============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: {{ .Values.ingress.grafana.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.haproxy.controller.ingressClass }}
    cert-manager.io/cluster-issuer: {{ .Values.global.clusterIssuer }}
    haproxy.org/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - {{ .Values.ingress.grafana.host }}
      secretName: grafana-tls
  rules:
    - host: {{ .Values.ingress.grafana.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.grafana.service }}
                port:
                  number: {{ .Values.ingress.grafana.port }}
