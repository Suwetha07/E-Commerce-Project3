# =============================================================
# Keycloak Realm Import Configuration
# Pre-configured realm with OIDC clients for:
#   - ArgoCD Dashboard
#   - Grafana Dashboards
#   - Kubernetes API Server (kubectl OIDC login)
# Includes roles, groups, and default users.
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: {{ .Values.keycloak.namespace }}
data:
  devops-platform-realm.json: |
    {
      "realm": "{{ .Values.keycloak.realm.name }}",
      "displayName": "{{ .Values.keycloak.realm.displayName }}",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "accessTokenLifespan": 300,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "roles": {
        "realm": [
          {
            "name": "platform-admin",
            "description": "Full administrative access to all platform resources and cluster"
          },
          {
            "name": "developer",
            "description": "Deploy, manage, and debug applications in allowed namespaces"
          },
          {
            "name": "viewer",
            "description": "Read-only access to dashboards and cluster resources"
          }
        ]
      },
      "groups": [
        {
          "name": "platform-admins",
          "realmRoles": ["platform-admin"]
        },
        {
          "name": "developers",
          "realmRoles": ["developer"]
        },
        {
          "name": "viewers",
          "realmRoles": ["viewer"]
        }
      ],
      "users": [
        {
          "username": "admin",
          "email": "admin@{{ .Values.global.domain }}",
          "firstName": "Platform",
          "lastName": "Admin",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "admin123",
              "temporary": false
            }
          ],
          "realmRoles": ["platform-admin"],
          "groups": ["platform-admins"]
        },
        {
          "username": "developer",
          "email": "developer@{{ .Values.global.domain }}",
          "firstName": "Dev",
          "lastName": "User",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "dev123",
              "temporary": false
            }
          ],
          "realmRoles": ["developer"],
          "groups": ["developers"]
        },
        {
          "username": "viewer",
          "email": "viewer@{{ .Values.global.domain }}",
          "firstName": "View",
          "lastName": "Only",
          "enabled": true,
          "emailVerified": true,
          "credentials": [
            {
              "type": "password",
              "value": "view123",
              "temporary": false
            }
          ],
          "realmRoles": ["viewer"],
          "groups": ["viewers"]
        }
      ],
      "clients": [
        {
          "clientId": "{{ .Values.keycloak.clients.argocd.clientId }}",
          "name": "Argo CD",
          "description": "OIDC client for ArgoCD SSO login",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "{{ .Values.keycloak.clients.argocd.clientSecret }}",
          "redirectUris": [
            "https://argocd.{{ .Values.global.domain }}/auth/callback",
            "https://argocd.{{ .Values.global.domain }}/api/dex/callback"
          ],
          "webOrigins": [
            "https://argocd.{{ .Values.global.domain }}"
          ],
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "defaultClientScopes": ["openid", "profile", "email", "groups"],
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": "{{ .Values.keycloak.clients.grafana.clientId }}",
          "name": "Grafana",
          "description": "OIDC client for Grafana SSO login",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "{{ .Values.keycloak.clients.grafana.clientSecret }}",
          "redirectUris": [
            "https://grafana.{{ .Values.global.domain }}/login/generic_oauth"
          ],
          "webOrigins": [
            "https://grafana.{{ .Values.global.domain }}"
          ],
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "defaultClientScopes": ["openid", "profile", "email", "groups"],
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": "{{ .Values.keycloak.clients.kubernetes.clientId }}",
          "name": "Kubernetes Cluster",
          "description": "OIDC client for kubectl and full cluster access via OIDC",
          "enabled": true,
          "clientAuthenticatorType": "client-secret",
          "secret": "{{ .Values.keycloak.clients.kubernetes.clientSecret }}",
          "redirectUris": [
            "http://localhost:8000",
            "http://localhost:18000"
          ],
          "standardFlowEnabled": true,
          "implicitFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "defaultClientScopes": ["openid", "profile", "email", "groups"],
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "audience-kubernetes",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.client.audience": "kubernetes",
                "id.token.claim": "true",
                "access.token.claim": "true"
              }
            }
          ]
        }
      ],
      "clientScopes": [
        {
          "name": "groups",
          "description": "OpenID Connect scope for group membership",
          "protocol": "openid-connect",
          "attributes": {
            "include.in.token.scope": "true",
            "display.on.consent.screen": "true"
          },
          "protocolMappers": [
            {
              "name": "groups",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "full.path": "false",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ]
    }
