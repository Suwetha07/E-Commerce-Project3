# =============================================================
# Loki Stack - Helm Values
# Chart: grafana/loki-stack
# Install: helm install loki grafana/loki-stack -n monitoring -f this-file.yaml
# =============================================================
# Loki: centralized log aggregation
# Promtail: log collector (DaemonSet on every node)
# =============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-stack-values
  namespace: {{ .Values.monitoring.namespace }}
  annotations:
    helm.sh/chart: "grafana/loki-stack"
    meta.helm.sh/release-name: "loki"
data:
  values.yaml: |
    # ---- Loki ----
    loki:
      enabled: true
      persistence:
        enabled: true
        storageClassName: ebs-sc
        size: 10Gi
      config:
        auth_enabled: false
        server:
          http_listen_port: 3100
        ingester:
          lifecycler:
            ring:
              kvstore:
                store: inmemory
              replication_factor: 1
          chunk_idle_period: 5m
          chunk_retain_period: 30s
        schema_config:
          configs:
            - from: "2024-01-01"
              store: boltdb-shipper
              object_store: filesystem
              schema: v11
              index:
                prefix: index_
                period: 24h
        storage_config:
          boltdb_shipper:
            active_index_directory: /data/loki/index
            cache_location: /data/loki/boltdb-cache
            shared_store: filesystem
          filesystem:
            directory: /data/loki/chunks
        limits_config:
          reject_old_samples: true
          reject_old_samples_max_age: 168h    # 7 days
          max_entries_limit_per_query: 5000
        table_manager:
          retention_deletes_enabled: true
          retention_period: 168h              # 7 days
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    # ---- Promtail ----
    promtail:
      enabled: true
      config:
        clients:
          - url: http://loki:3100/loki/api/v1/push
        scrape_configs:
          - job_name: kubernetes-pods
            kubernetes_sd_configs:
              - role: pod
            pipeline_stages:
              - docker: {}
              - labeldrop:
                  - filename
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_node_name]
                target_label: node
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod
              - source_labels: [__meta_kubernetes_pod_container_name]
                target_label: container
              - source_labels: [__meta_kubernetes_pod_label_app]
                target_label: app
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

    # Grafana is managed by kube-prometheus-stack
    grafana:
      enabled: false
