# =============================================================
# ArgoCD AppProject: platform
# Scoped to platform infrastructure components
# =============================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Platform infrastructure components (Keycloak, Monitoring, Ingress)"

  sourceRepos:
    - "https://github.com/M-VIGNESH3/E-Commerce-Project.git"
    - "https://charts.bitnami.com/bitnami"
    - "https://prometheus-community.github.io/helm-charts"
    - "https://grafana.github.io/helm-charts"
    - "https://haproxytech.github.io/helm-charts"
    - "https://charts.jetstack.io"
    - "https://argoproj.github.io/argo-helm"

  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "keycloak"
    - server: "https://kubernetes.default.svc"
      namespace: "monitoring"
    - server: "https://kubernetes.default.svc"
      namespace: "haproxy-ingress"
    - server: "https://kubernetes.default.svc"
      namespace: "cert-manager"
    - server: "https://kubernetes.default.svc"
      namespace: "argo-rollouts"
    - server: "https://kubernetes.default.svc"
      namespace: "argocd"

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: admin
      description: "Full access to platform infrastructure"
      policies:
        - p, proj:platform:admin, applications, *, platform/*, allow
      groups:
        - platform-admins
