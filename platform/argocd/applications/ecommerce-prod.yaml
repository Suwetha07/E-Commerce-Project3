# =============================================================
# E-Commerce Application - PRODUCTION Environment
# Auto-sync DISABLED - manual sync required
# Automated rollback on degraded health
# =============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-prod
  namespace: argocd
  labels:
    environment: prod
    app.kubernetes.io/part-of: ecommerce
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.email: ""
    notifications.argoproj.io/subscribe.on-sync-failed.email: ""
    notifications.argoproj.io/subscribe.on-health-degraded.email: ""
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ecommerce
  source:
    repoURL: "https://github.com/M-VIGNESH3/E-Commerce-Project.git"
    targetRevision: feature/argo-blue-green
    path: ecommerce-microservices/release
    helm:
      valueFiles:
        - ../../platform/environments/prod/values-override.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: clahanstore-prod
  # NO automated sync - production requires manual approval
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 2
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
