        image: vignesh8386/authentication-service:latest
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: '3002'
        - name: JWT_SECRET
          value: supersecretjwtkey_12345
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: shopverse-config
              key: MONGO_URI_AUTH
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 250m
            memory: 256Mi
