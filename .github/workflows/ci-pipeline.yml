name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
      - feature/ci-pipeline
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      service:
        description: "Select the service to build and deploy"
        required: true
        type: choice
        options:
          - all
          - api-gateway
          - user-service
          - authentication-service
          - product-service
          - search-service
          - inventory-service
          - cart-service
          - wishlist-service
          - order-service
          - payment-service
          - invoice-service
          - shipping-service
          - review-rating-service
          - recommendation-service
          - admin-service
      image_tag:
        description: "Custom tag for the Docker image (e.g., v1.2.0)"
        required: false
        type: string

jobs:
  # ---------------------------------------------------------
  # Prepare the service matrix based on the selected input
  # ---------------------------------------------------------
  prepare:
    name: Prepare Service Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set service matrix
        id: set-matrix
        run: |
          SERVICE="${{ github.event.inputs.service }}"
          if [ -z "$SERVICE" ] || [ "$SERVICE" = "all" ]; then
            echo 'matrix={"service":["api-gateway","user-service","authentication-service","product-service","search-service","inventory-service","cart-service","wishlist-service","order-service","payment-service","invoice-service","shipping-service","review-rating-service","recommendation-service","admin-service"]}' >> $GITHUB_OUTPUT
          else
            echo "matrix={\"service\":[\"$SERVICE\"]}" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------
  # SonarQube Scan
  # ---------------------------------------------------------
  sonarqube:
    name: "SonarQube Scan (${{ matrix.service }})"
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=${{ matrix.service }}
            -Dsonar.projectName=${{ matrix.service }}
            -Dsonar.sources=ecommerce-microservices/${{ matrix.service }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Pipeline Failed (SonarQube) - ${{ matrix.service }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: GitHub Actions
          body: "The SonarQube code quality scan failed for ${{ matrix.service }}. Please check the workflow logs."

  # ---------------------------------------------------------
  # Snyk Vulnerability Scan
  # ---------------------------------------------------------
  snyk:
    name: "Snyk Scan (${{ matrix.service }})"
    needs: [prepare, sonarqube]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd ecommerce-microservices/${{ matrix.service }}
          npm install --no-audit --no-fund

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=ecommerce-microservices/${{ matrix.service }}/package.json --severity-threshold=high
          command: test

      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results-${{ matrix.service }}
          path: snyk-*.json

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Pipeline Failed (Snyk) - ${{ matrix.service }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: GitHub Actions
          body: "The Snyk dependency scan failed for ${{ matrix.service }} due to high/critical vulnerabilities."

  # ---------------------------------------------------------
  # Docker Build
  # ---------------------------------------------------------
  docker_build:
    name: "Docker Build (${{ matrix.service }})"
    needs: [prepare, snyk]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    outputs:
      image_tag: ${{ steps.set_tag.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine Image Tag
        id: set_tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ steps.set_tag.outputs.TAG }} \
            -f ecommerce-microservices/${{ matrix.service }}/Dockerfile \
            ecommerce-microservices/${{ matrix.service }}

      - name: Save Docker image
        run: docker save ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ steps.set_tag.outputs.TAG }} > image.tar

      - name: Upload image artifact for scanning
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.service }}
          path: image.tar

  # ---------------------------------------------------------
  # Trivy Image Scan
  # ---------------------------------------------------------
  image_scan:
    name: "Trivy Scan (${{ matrix.service }})"
    needs: [prepare, docker_build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ matrix.service }}

      - name: Load Docker image
        run: docker load < image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ needs.docker_build.outputs.image_tag }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Send email on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Pipeline Failed (Trivy) - ${{ matrix.service }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: GitHub Actions
          body: "The Trivy image scan failed for ${{ matrix.service }}. High or critical vulnerabilities were found."

  # ---------------------------------------------------------
  # Docker Push
  # ---------------------------------------------------------
  docker_push:
    name: "Docker Push (${{ matrix.service }})"
    needs: [prepare, docker_build, image_scan]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ matrix.service }}

      - name: Load Docker image
        run: docker load < image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and Push Docker Image
        run: |
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ needs.docker_build.outputs.image_tag }} ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ needs.docker_build.outputs.image_tag }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest

      - name: Send Final Success Summary Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Pipeline Succeeded - ${{ matrix.service }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: GitHub Actions
          body: |
            The CI pipeline completed successfully for ${{ matrix.service }}!

            Docker Image: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}
            Tags Pushed: ${{ needs.docker_build.outputs.image_tag }}, latest

            All scans (SonarQube, Snyk, and Trivy) passed.
